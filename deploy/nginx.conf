# Nginx site config for the Meet app (domain: meet.elloindia.in).
# Save as: /etc/nginx/sites-available/meet   then symlink into sites-enabled.
#
# Certbot (Let's Encrypt) will automatically add the SSL cert lines and the
# HTTP->HTTPS redirect when you run it — see DEPLOY.md.

server {
    listen 80;
    server_name meet.elloindia.in;

    # Serve the built React app (static files).
    root /var/www/meet/client/dist;
    index index.html;

    # Proxy Socket.IO (signaling) through to the Node server.
    # WebSocket upgrade headers are required for it to work.
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # LiveKit SFU signalling. Only the WebSocket handshake goes through Nginx —
    # media flows directly over the UDP range in livekit.yaml and never touches
    # this proxy, which is why opening those ports matters more than this block.
    location /livekit {
        proxy_pass http://127.0.0.1:7880;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # A call is a long-lived connection; the 60s default would cut it.
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Health check passthrough (optional).
    location /health {
        proxy_pass http://127.0.0.1:3001;
    }

    # SPA fallback: any unknown path returns index.html so React Router works
    # (e.g. refreshing /room/abc123 doesn't 404).
    location / {
        try_files $uri $uri/ /index.html;
    }
}
