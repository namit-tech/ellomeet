# Coturn (TURN/STUN) config for the Meet app.
# Install coturn:  sudo apt install coturn
# Save this as:    /etc/turnserver.conf   (back up the original first)
# Enable service:  set TURNSERVER_ENABLED=1 in /etc/default/coturn
# Then:            sudo systemctl enable --now coturn
#
# Replace YOUR_PUBLIC_IP and meet.elloindia.in below.

# Listen on the standard TURN port.
listening-port=3478

# The VPS's PUBLIC IP address. Find it with:  curl -4 ifconfig.me
# If your VPS is behind NAT, also set:  external-ip=PUBLIC_IP/PRIVATE_IP
external-ip=YOUR_PUBLIC_IP

# Realm = your domain.
realm=meet.elloindia.in
server-name=meet.elloindia.in

# --- Authentication ---
# Simple long-term credential. The username/password here MUST match the
# VITE_TURN_USERNAME / VITE_TURN_CREDENTIAL you build the client with.
lt-cred-mech
user=meetuser:CHANGE_ME_TO_A_STRONG_SECRET

# --- Hardening ---
# Restrict the relay port range (open these in your firewall too).
min-port=49152
max-port=65535

# Don't relay to private/loopback ranges (prevents abuse).
no-loopback-peers
no-multicast-peers
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255

# Reasonable defaults.
fingerprint
stale-nonce
no-cli

# --- Optional: TLS TURN on 5349 (turns:) for strict networks ---
# Reuse your Let's Encrypt cert (see DEPLOY.md for the copy step):
# tls-listening-port=5349
# cert=/etc/coturn/fullchain.pem
# pkey=/etc/coturn/privkey.pem
